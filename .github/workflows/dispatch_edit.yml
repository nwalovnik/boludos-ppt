name: Despidos - editar o eliminar evento

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID del evento (hash de 12 chars)"
        required: true
        type: string
      action:
        description: "edit o delete"
        required: true
        type: choice
        options: ["edit", "delete"]
      patch:
        description: "JSON con campos a editar (solo si action=edit)"
        required: false
        type: string
        default: "{}"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Apply edit/delete
        run: |
          python scraper/edit_event.py \
            --id "${{ inputs.id }}" \
            --action "${{ inputs.action }}" \
            --patch '${{ inputs.patch }}'

      - name: Regenerar despidos.json desde bedrock
        run: python scraper/scrape_despidos.py --skip-rss

      - name: Commit & push
        run: |
          git config user.name "despidos-bot"
          git config user.email "despidos-bot@users.noreply.github.com"
          CHANGES=""
          for FILE in despidos.json scraper/historical_despidos.json; do
            if [[ -n "$(git status --porcelain "$FILE")" ]]; then
              git add "$FILE"
              CHANGES="$CHANGES $FILE"
            fi
          done
          if [[ -n "$CHANGES" ]]; then
            git commit -m "despidos: ${{ inputs.action }} evento ${{ inputs.id }}"
            git push
            echo "Pushed: $CHANGES"
          else
            echo "Sin cambios (¿id inexistente o patch vacio?)"
            exit 1
          fi
