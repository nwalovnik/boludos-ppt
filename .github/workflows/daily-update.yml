name: Update macro data daily

on:
  # 11:30 UTC = 08:30 ART — después de que INDEC suele publicar
  schedule:
    - cron: "30 11 * * *"
  # Permite correr manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install system deps (unrar para fiscal Hacienda)
        run: sudo apt-get update && sudo apt-get install -y unrar

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Generar PPTX publicaciones de la semana
        run: python scraper/build_slides.py || echo "Sin publicaciones esta semana o sin pubs aún registradas"

      - name: Commit & push si cambió data.json o publicaciones_semana.pptx
        run: |
          git config user.name "macro-bot"
          git config user.email "macro-bot@users.noreply.github.com"
          CHANGES=""
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git add data.json
            CHANGES="data.json"
          fi
          if [[ -f publicaciones_semana.pptx ]] && [[ -n "$(git status --porcelain publicaciones_semana.pptx)" || ! "$(git ls-files publicaciones_semana.pptx)" ]]; then
            git add publicaciones_semana.pptx
            CHANGES="$CHANGES publicaciones_semana.pptx"
          fi
          if [[ -n "$CHANGES" ]]; then
            git commit -m "data: update $(date -u +%Y-%m-%d) ($CHANGES)"
            git push
            echo "Pushed: $CHANGES"
          else
            echo "No changes."
          fi
