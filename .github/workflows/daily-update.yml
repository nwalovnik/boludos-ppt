name: Update macro data daily

on:
  # 11:30 UTC = 08:30 ART — después de que INDEC suele publicar
  schedule:
    - cron: "30 11 * * *"
  # Permite correr manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit & push if data.json changed
        run: |
          git config user.name "macro-bot"
          git config user.email "macro-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git add data.json
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed update."
          else
            echo "No changes."
          fi
