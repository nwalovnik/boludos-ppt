name: Update macro data daily

on:
  # Cron de GitHub Actions tiene delays grandes (15-60 min) en horarios :00 y :30.
  # Disparamos 3 veces para asegurar que el dato del dia se capte:
  #   19:47 UTC = 16:47 ART (primary, despues del cierre de pubs)
  #   21:47 UTC = 18:47 ART (backup #1)
  #   23:47 UTC = 20:47 ART (backup #2)
  # El workflow solo commitea si hay cambios, así que las corridas extra son no-op.
  schedule:
    - cron: "47 19 * * *"
    - cron: "47 21 * * *"
    - cron: "47 23 * * *"
  # Permite correr manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install system deps (unrar para fiscal Hacienda)
        run: sudo apt-get update && sudo apt-get install -y unrar

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Fetch calendarios oficiales (INDEC PDF + BCRA + ARCA + Hacienda)
        run: python scraper/fetch_calendars.py || echo "Fallo fetch calendarios, sigo igual"

      - name: Run scraper macro
        run: python scraper/scrape.py

      - name: Refresh manual despidos desde Google Sheet
        env:
          GSHEET_URL: ${{ vars.GSHEET_URL }}
        run: python scraper/load_manual_excel.py --gsheet-env || echo "Sin GSHEET_URL configurada o fallo, sigo igual"

      - name: Run scraper despidos
        run: python scraper/scrape_despidos.py || echo "Scraper despidos fallo, sigo igual"

      - name: Generar PPTX publicaciones de la semana
        run: python scraper/build_slides.py || echo "Sin publicaciones esta semana o sin pubs aún registradas"

      - name: Commit & push si cambiaron outputs
        run: |
          git config user.name "macro-bot"
          git config user.email "macro-bot@users.noreply.github.com"
          CHANGES=""
          for FILE in data.json despidos.json scraper/historical_despidos.json scraper/calendar_oficial.json publicaciones_semana.pptx; do
            if [[ -f "$FILE" ]] && [[ -n "$(git status --porcelain "$FILE")" || -z "$(git ls-files "$FILE")" ]]; then
              git add "$FILE"
              CHANGES="$CHANGES $FILE"
            fi
          done
          if [[ -n "$CHANGES" ]]; then
            git commit -m "data: update $(date -u +%Y-%m-%d) ($CHANGES)"
            git push
            echo "Pushed:$CHANGES"
          else
            echo "No changes."
          fi
